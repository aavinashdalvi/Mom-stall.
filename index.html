<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAT - Stealth Pay</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #e8f5e9; }
        .test-card { text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 85%; }
        .status-msg { font-size: 14px; color: #666; margin-top: 15px; font-style: italic; }
        button { background: #1b5e20; color: white; border: none; padding: 20px; border-radius: 10px; font-size: 18px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="test-card">
    <h2>Test Version 1.0</h2>
    <p>Verification of Stealth Redirect</p>
    <button onclick="runTest()">SIMULATE PAYMENT</button>
    <div id="log" class="status-msg">Waiting for scan...</div>
</div>

<script>
    function runTest() {
        const log = document.getElementById('log');
        
        // 1. Log Step 1
        log.innerText = "Step 1: Launching UPI App...";
        
        // TEST DATA (Replace with yours for final check)
        const testUpi = "avinash@upi"; 
        const testWA = "91XXXXXXXXXX";

        // Trigger UPI
        window.location.href = `upi://pay?pa=${testUpi}&pn=TestUser&cu=INR`;

        // 2. Log Step 2
        setTimeout(() => {
            log.innerText = "Step 2: Switching to WhatsApp for Bill...";
            window.location.href = `https://wa.me/${testWA}?text=Test%20Successful!%20Send%20my%20bill.`;
        }, 2500);
    }
</script>
