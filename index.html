<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAT - Stealth Pay</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #e8f5e9; }
        .test-card { text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 85%; }
        .status-msg { font-size: 14px; color: #666; margin-top: 15px; font-style: italic; }
        button { background: #1b5e20; color: white; border: none; padding: 20px; border-radius: 10px; font-size: 18px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="test-card">
    <h2>Test Version 1.0</h2>
    <p>Verification of Stealth Redirect</p>
    <button onclick="runTest()">SIMULATE PAYMENT</button>
    <div id="log" class="status-msg">Waiting for scan...</div>
</div>

<script>
    function runTest() {
const log = document.getElementById('log');
        
        log.innerText = "Step 1: Launching UPI App...";
        
        // --- PRODUCTION DATA ---
        const upiId = "9870006765@ptsbi"; // Replace with your mom's ID
        const waNumber = "919920980011"; // Must start with 91, no '+' or spaces
        const momName = "MomsFlowerCorner";

        // 1. Launch UPI Intent
        window.location.href = upi://pay?pa=${upiId}&pn=${momName}&cu=INR&mode=02;

        // 2. The WhatsApp Redirect (Hardened for 404 Prevention)
        setTimeout(() => {
            log.innerText = "Step 2: Opening WhatsApp for Receipt...";
            
            // Using api.whatsapp.com is more stable for redirects than wa.me
            const message = "Hi! I just paid for flowers. Please send my digital bill.";
            const encodedMessage = encodeURIComponent(message);
            const waUrl = https://api.whatsapp.com/send?phone=${waNumber}&text=${encodedMessage};
            
            window.location.href = waUrl;
        }, 3500); // Increased to 3.5s to ensure UPI app takes priority
    }
</script>

</body>
</html>
